name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run deterministic release profile
        run: npm run release:ci

      - name: Upload release profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-harness-release-profile
          path: artifacts/release-profile/fixture-web-release/
          if-no-files-found: error

      - name: Build (source compilation)
        run: npm run build

      - name: Built CLI smoke (list command requires no auth)
        run: npm run verify:built

      - name: Package distributable
        run: npm pack --dry-run

      - name: Retain compiled distribution
        uses: actions/upload-artifact@v4
        with:
          name: qa-harness-dist
          path: dist/
